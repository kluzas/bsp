name: Build U-Boot Raxa CM3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             git             python3-pip             flex             bison             libncurses5-dev             build-essential             libssl-dev             bc             python3-setuptools             gcc-aarch64-linux-gnu             binutils-aarch64-linux-gnu             ruby-full

      - name: Install Python and Ruby dependencies
        run: |
          pip3 install pyelftools --break-system-packages
          gem install fpm --user-install
          echo "$HOME/.local/share/gem/ruby/3.2.0/bin" >> $GITHUB_PATH

      - name: Setup Environment
        run: |
          export CROSS_COMPILE=aarch64-linux-gnu-
          chmod +x bsp

      - name: Build U-Boot
        run: |
          set -xe
          echo "--- FPM Diagnostics ---"
          fpm --version
          fpm --help | head -n 30
          echo "------------------------"
          ./bsp u-boot latest radxa-cm3-rpi-cm4-io --native-build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-radxa-cm3-rpi-cm4-io-deb
          path: ./*.deb
