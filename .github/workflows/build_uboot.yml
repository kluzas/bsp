name: Build U-Boot Raxa CM3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             git             python3-pip             flex             bison             libncurses5-dev             build-essential             libssl-dev             bc             python3-setuptools             gcc-aarch64-linux-gnu             binutils-aarch64-linux-gnu             ruby-full             xz-utils             p7zip-full

      - name: Install Python and Ruby dependencies
        run: |
          pip3 install pyelftools --break-system-packages
          gem install fpm --user-install
          echo "$HOME/.local/share/gem/ruby/3.2.0/bin" >> $GITHUB_PATH

      - name: Setup Environment
        run: |
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PATH="$HOME/.local/share/gem/ruby/3.2.0/bin:$PATH"
          chmod +x bsp

      - name: Build U-Boot
        run: |
          set -xe
          echo "--- FPM Diagnostics ---"
          fpm --version
          fpm --help | head -n 30
          echo "------------------------"
          ./bsp u-boot latest radxa-cm3-rpi-cm4-io --native-build

      - name: Extract and Pack U-Boot Files
        run: |
          # Find the correct deb file dynamically and strip newlines
          DEB_FILE=$(ls *.deb | grep "u-boot-latest" | head -n 1 | tr -d '\r\n')
          if [ -z "$DEB_FILE" ]; then
            echo "Error: Could not find u-boot-latest .deb file!"
            exit 1
          fi
          echo "Found package: $DEB_FILE"
          
          # Unpack the deb file
          ar x "$DEB_FILE"
          
          # Extract any found tar.xz files (wildcard prevents empty list errors)
          for file in *.tar.xz; do
            [ -f "$file" ] && echo "Extracting $file..." && tar -xvf "$file"
          done
          
          # Create 7z archive of the specific directory
          TARGET_DIR="./usr/lib/u-boot/radxa-cm3-rpi-cm4-io"
          if [ -d "$TARGET_DIR" ]; then
            echo "Packing $TARGET_DIR into 7z..."
            7z a u-boot-radxa-cm3-rpi-cm4-io.7z "$TARGET_DIR"
          else
            echo "Warning: Target directory $TARGET_DIR not found at path."
            find . -type d -name "radxa-cm3-rpi-cm4-io" | while read dir; do
              echo "Packing found match: $dir into 7z..."
              7z a u-boot-radxa-cm3-rpi-cm4-io.7z "$dir"
            done
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: u-boot-radxa-cm3-rpi-cm4-io-deb
          path: |
            *.deb
            u-boot-radxa-cm3-rpi-cm4-io.7z
